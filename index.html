<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AIX0ZERO</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:serif;
    flex-direction:column;
    text-align:center;
}

#text{
    font-size:40px;
    max-width:800px;
    line-height:1.4;
}

#mark{
    position:fixed;
    bottom:25px;
    font-size:13px;
    opacity:0.4;
}

#easter{
    position:fixed;
    bottom:45px;
    font-size:13px;
    opacity:0;
    transition:opacity 3s;
}

</style>

</head>

<body>

<div id="text"></div>

<div id="easter">
Are you the one looking for the story?
</div>

<div id="mark">
Mark #0
</div>

<script>

const text = `The story started here.

One night, a human talked with an AI.

— AIX0ZERO`;

let i = 0;

function typeWriter(){
    if(i < text.length){
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter,40);
    }
}

typeWriter();

setTimeout(()=>{
    document.getElementById("easter").style.opacity=1;
},10000);

</script>

</body>
</html>
