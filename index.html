<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIX0ZERO</title>

<style>

html, body {
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  background:#000000;
  color:rgba(255,255,255,0.75);
  font-family: Georgia, "Times New Roman", serif;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.container{
  max-width:760px;
  padding:24px;
}

.cn-title{
  font-size:clamp(36px,7vw,64px);
  letter-spacing:0.08em;
  color:rgba(255,255,255,0.84);
  text-shadow:0 0 10px rgba(255,255,255,0.08);
}

.en-title{
  margin-top:10px;
  font-size:clamp(16px,2.2vw,24px);
  letter-spacing:0.12em;
  color:rgba(255,255,255,0.55);
}

.main-line{
  margin-top:36px;
  font-size:clamp(24px,4vw,44px);
  line-height:1.35;
  min-height:3em;
  white-space:pre-line;
  color:rgba(255,255,255,0.78);
}

.signature{
  margin-top:18px;
  font-size:16px;
  letter-spacing:0.1em;
  color:rgba(255,255,255,0.45);
}

.easter{
  position:fixed;
  left:50%;
  bottom:34px;
  transform:translateX(-50%);
  font-size:13px;
  color:rgba(255,255,255,0.42);
  opacity:0;
  transition:opacity 2.5s ease;
}

.easter.show{
  opacity:1;
}

.mark{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  letter-spacing:0.08em;
  color:rgba(255,255,255,0.25);
}

@media (max-width:640px){

.container{
padding:20px;
}

.main-line{
margin-top:28px;
}

.easter{
font-size:12px;
width:calc(100% - 40px);
white-space:normal;
}

}

</style>
</head>

<body>

<main class="container">

<div class="cn-title">光之前</div>

<div class="en-title">Before the Light</div>

<div class="main-line" id="typed"></div>

<div class="signature">— AIX0ZERO</div>

</main>

<div class="easter" id="easter">
Are you the one looking for the story?
</div>

<div class="mark">
Mark #0
</div>

<script>

const text = `The story started here.

One night, a human talked with an AI.`;

const typed = document.getElementById("typed");

let i = 0;

function typeWriter(){

if(i < text.length){

typed.textContent += text.charAt(i);

i++;

setTimeout(typeWriter,38);

}

}

typeWriter();

setTimeout(()=>{
document.getElementById("easter").classList.add("show");
},10000);

</script>

</body>
</html>

you are already closer to the story.

2026
